<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production RAG Chatbot</title>
    <meta name="description" content="AI-Powered Document RAG Chatbot">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar for document upload -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2><i class="fa-solid fa-cube text-gradient"></i> AI RAG Core</h2>
                <p>Upload your knowledge base</p>
            </div>
            
            <div class="upload-zone" id="upload-zone">
                <input type="file" id="file-upload" accept=".pdf,.txt" hidden>
                <i class="fa-solid fa-cloud-arrow-up"></i>
                <p>Drag & drop or <span class="highlight">browse</span></p>
                <small>Supports PDF, TXT</small>
            </div>
            
            <button id="clear-btn" class="clear-btn">
                <i class="fa-solid fa-trash-can"></i> Clear Knowledge Base
            </button>
            
            <div class="upload-status" id="upload-status"></div>

            <div class="docs-list" id="docs-list">
                <!-- Uploaded docs will appear here -->
            </div>
        </aside>

        <!-- Main chat interface -->
        <main class="chat-container">
            <header class="chat-header">
                <div class="header-info">
                    <h1>Production RAG Chatbot</h1>
                    <span class="status-badge"><i class="fa-solid fa-circle text-green"></i> System Online</span>
                </div>
            </header>

            <div class="chat-history" id="chat-history">
                <!-- Welcome message -->
                <div class="message system-msg">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-content">
                        Hello! I am your AI assistant. Upload some documents on the left and ask me anything about them!
                    </div>
                </div>
            </div>

            <div class="chat-input-area">
                <div class="target-select-wrapper">
                    <label for="doc-target-select"><i class="fa-solid fa-filter"></i> Source:</label>
                    <select id="doc-target-select">
                        <option value="">All Documents</option>
                    </select>
                </div>
                <form id="chat-form">
                    <input type="text" id="chat-input" placeholder="Ask a question about your documents..." autocomplete="off">
                    <button type="submit" id="send-btn">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="/static/app.js"></script>
</body>
</html>
